<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Andesmar Cargas — Direcciones Pendientes</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>

<div class="login-page">
  <div class="login-card">

    <div class="login-logo">
      <div class="login-logo-img-wrapper">
        <img src="assets/logo_andesmar.png" alt="Andesmar Cargas"
             onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" />
        <span style="display:none; font-size:20px; font-weight:700; color:#fff; letter-spacing:0.05em;">ANDESMAR</span>
      </div>
      <div class="login-logo-title">DIRECCIONES PENDIENTES</div>
      <div class="login-logo-subtitle">Sistema de georeferenciación</div>
    </div>

    <form class="login-form" id="login-form" autocomplete="off">
      <div id="login-error" class="login-error">
        Credenciales incorrectas. Verificá tu usuario y contraseña.
      </div>

      <div class="form-group">
        <label class="form-label" for="input-username">Usuario</label>
        <input
          class="form-input"
          type="text"
          id="input-username"
          name="username"
          placeholder="cnd_mendoza"
          autocomplete="username"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="input-password">Contraseña</label>
        <input
          class="form-input"
          type="password"
          id="input-password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
      </div>

      <button type="submit" class="btn-login" id="btn-login">
        Ingresar
      </button>
    </form>

    <div class="login-footer">
      Andesmar Cargas &copy; 2025 · Sistema interno
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="js/toast.js"></script>
<script src="js/config.js"></script>
<script src="js/sheets.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
